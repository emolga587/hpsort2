name: build and deploy to AWS

on:
  push:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v6
        with:
          submodules: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install Dependencies
        run: deno cache vite.config.ts

      - name: Build
        run: deno task build
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        if: github.repository == 'emolga587/hpsort2'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1
          
      - name: Deploy
        if: github.repository == 'emolga587/hpsort2'
        run: aws s3 cp --recursive --region ap-northeast-1 dist s3://italian-red/16be-at/sort/
        
      - name: Clear CloudFront cache
        if: github.repository == 'emolga587/hpsort2'
        run: aws cloudfront create-invalidation --distribution-id E2P1UCYH9XFRDL --paths "/sort/*"
